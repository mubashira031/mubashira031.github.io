<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mubashira - Portfolio</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <header>
        <nav class="navbar">
            <div class="nav-container">
                <div class="nav-logo">
                    <a href="#home">Mubashira</a>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <section id="home" class="hero">
            <div class="hero-background">
                <div class="floating-shape shape-1"></div>
                <div class="floating-shape shape-2"></div>
                <div class="floating-shape shape-3"></div>
            </div>
            <div class="hero-content">
                <div class="hero-badge">Welcome to My Portfolio</div>
                <h1 class="hero-title">Hi 👋, I'm <span class="gradient-text">Mubashira</span></h1>
                <p class="hero-subtitle">Frontend Web Developer | BSc Computer Science Student</p>
                <p class="hero-tagline">React + Tailwind Enthusiast 🚀</p>
                <div class="hero-buttons">
                    <a href="#about" class="btn-primary">Learn More</a>
                    <a href="#projects" class="btn-outline">View Projects</a>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Mubashira. All rights reserved.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>

</html>
